<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" role="img" aria-label="片假名字源示意图">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffffff" />
      <stop offset="1" stop-color="#eef3fb" />
    </linearGradient>
    <linearGradient id="ink" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1d1d1f" />
      <stop offset="1" stop-color="#0b5fd7" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#000000" flood-opacity="0.12" />
    </filter>
  </defs>
  <rect width="1200" height="720" rx="56" fill="url(#bg)" />
  <text x="64" y="92" fill="#1d1d1f" font-family="system-ui, sans-serif" font-size="34" font-weight="700">片假名：从汉字楷书里截取骨架</text>
  <text x="64" y="132" fill="#6e6e73" font-family="system-ui, sans-serif" font-size="20">看的是“部件”，不是完整汉字。先抓左边、上边和最明显的转折。</text>

  <g filter="url(#shadow)">
    <rect x="64" y="180" width="320" height="220" rx="28" fill="#fff" stroke="#d9dce5" />
    <rect x="440" y="180" width="320" height="220" rx="28" fill="#fff" stroke="#d9dce5" />
    <rect x="816" y="180" width="320" height="220" rx="28" fill="#fff" stroke="#d9dce5" />

    <rect x="64" y="432" width="320" height="220" rx="28" fill="#fff" stroke="#d9dce5" />
    <rect x="440" y="432" width="320" height="220" rx="28" fill="#fff" stroke="#d9dce5" />
    <rect x="816" y="432" width="320" height="220" rx="28" fill="#fff" stroke="#d9dce5" />
  </g>

  <g font-family="serif" text-anchor="middle">
    <text x="224" y="266" fill="#b4b8c2" font-size="120" font-weight="700">阿</text>
    <path d="M170 300h108" stroke="url(#ink)" stroke-width="10" stroke-linecap="round" />
    <path d="M182 320h84" stroke="url(#ink)" stroke-width="10" stroke-linecap="round" />
    <text x="224" y="374" fill="#1d1d1f" font-size="114" font-weight="800">ア</text>
    <text x="224" y="402" fill="#6e6e73" font-family="system-ui, sans-serif" font-size="18">阿 → ア</text>

    <text x="600" y="266" fill="#b4b8c2" font-size="120" font-weight="700">伊</text>
    <path d="M536 302h112" stroke="url(#ink)" stroke-width="10" stroke-linecap="round" />
    <path d="M558 322h72" stroke="url(#ink)" stroke-width="10" stroke-linecap="round" />
    <text x="600" y="374" fill="#1d1d1f" font-size="114" font-weight="800">イ</text>
    <text x="600" y="402" fill="#6e6e73" font-family="system-ui, sans-serif" font-size="18">伊 → イ</text>

    <text x="976" y="266" fill="#b4b8c2" font-size="120" font-weight="700">之</text>
    <path d="M922 300h108" stroke="url(#ink)" stroke-width="10" stroke-linecap="round" />
    <path d="M944 320h68" stroke="url(#ink)" stroke-width="10" stroke-linecap="round" />
    <text x="976" y="374" fill="#1d1d1f" font-size="114" font-weight="800">シ</text>
    <text x="976" y="402" fill="#6e6e73" font-family="system-ui, sans-serif" font-size="18">之 → シ</text>

    <text x="224" y="518" fill="#b4b8c2" font-size="120" font-weight="700">千</text>
    <path d="M166 552h116" stroke="url(#ink)" stroke-width="10" stroke-linecap="round" />
    <path d="M226 506v82" stroke="url(#ink)" stroke-width="10" stroke-linecap="round" />
    <text x="224" y="626" fill="#1d1d1f" font-size="114" font-weight="800">チ</text>
    <text x="224" y="654" fill="#6e6e73" font-family="system-ui, sans-serif" font-size="18">千 → チ</text>

    <text x="600" y="518" fill="#b4b8c2" font-size="120" font-weight="700">止</text>
    <path d="M542 548h114" stroke="url(#ink)" stroke-width="10" stroke-linecap="round" />
    <path d="M600 500v92" stroke="url(#ink)" stroke-width="10" stroke-linecap="round" />
    <text x="600" y="626" fill="#1d1d1f" font-size="114" font-weight="800">ト</text>
    <text x="600" y="654" fill="#6e6e73" font-family="system-ui, sans-serif" font-size="18">止 → ト</text>

    <text x="976" y="518" fill="#b4b8c2" font-size="120" font-weight="700">和</text>
    <path d="M914 548h122" stroke="url(#ink)" stroke-width="10" stroke-linecap="round" />
    <path d="M960 500v92" stroke="url(#ink)" stroke-width="10" stroke-linecap="round" />
    <text x="976" y="626" fill="#1d1d1f" font-size="114" font-weight="800">ワ</text>
    <text x="976" y="654" fill="#6e6e73" font-family="system-ui, sans-serif" font-size="18">和 → ワ</text>
  </g>
</svg>
